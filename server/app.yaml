name: agentui-server

services:
  - name: api
    source_dir: /
    github:
      repo: RamiRafee/Groq-2.0
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: GROQ_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TAVILY_API_KEY
        scope: RUN_TIME
        type: SECRET
    routes:
      - path: /